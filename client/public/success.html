<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent — Joshua Sambol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, #E4F0D4 0%, #F3EAD9 48%, #FBE1CB 100%);
            color: #26402E;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .container {
            text-align: center;
            padding: 3rem 2.5rem;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(80, 70, 40, 0.14);
            max-width: 520px;
            margin: 1rem;
        }
        .star { font-size: 3rem; }
        h1 {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 2.2rem;
            margin: 0.5rem 0 0.75rem;
        }
        p { color: #55705C; line-height: 1.6; font-size: 1.05rem; margin: 0 0 1.75rem; }
        a.button {
            display: inline-block;
            text-decoration: none;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            color: #fff;
            background: #FF6B47;
            padding: 13px 28px;
            border-radius: 999px;
            box-shadow: 0 10px 24px rgba(255,107,71,0.35);
            transition: transform 0.2s;
        }
        a.button:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="star">✨</div>
        <h1>Message sent!</h1>
        <p>Thanks for reaching out — I&#39;ve got your message and I&#39;ll get back to you as soon as I can.</p>
        <a class="button" href="/">← Back home</a>
    </div>
</body>
</html>
